services:
  db:
    image: mysql:8.0
    restart: on-failure
    command: --performance_schema=OFF --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${CHATROOM_DATABASE}
      # JANGAN ada MYSQL_USER: root di sini!
      # Hapus atau ganti ke user lain kalau mau, tapi mending hapus dulu.
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      timeout: 5s
      retries: 10
      interval: 10s

  redis:
    image: redis:7-alpine
    restart: on-failure
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    image: chatroom:latest
    restart: on-failure
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CHATROOM_DATABASE_USERNAME=root
      - CHATROOM_DATABASE_PASSWORD=${DB_PASSWORD:-secret_db_password}
    ports:
      - "5555:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
