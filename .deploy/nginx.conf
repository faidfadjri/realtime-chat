server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    root /faidfadjri/chatroom/public;

    # Serve static files directly (Vite outputs to /assets or /vite)
    location ~ ^/(assets|vite)/ {
        expires max;
        gzip_static on;
        add_header Cache-Control public;
    }

    # Main app reverse-proxied to Docker Compose
    location / {
        proxy_pass http://127.0.0.1:5555;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Outstanding configuration for WebSocket (ActionCable) real-time streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # Error pages fallback
    error_page 500 502 503 504 /500.html;
    error_page 404 /404.html;

    client_max_body_size 20M;
}