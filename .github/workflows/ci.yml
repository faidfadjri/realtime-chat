name: CI/CD

on:
  pull_request:
  push:
    branches: [master]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix shebang & permissions (Windows compatibility)
        run: |
          chmod +x bin/* || true
          sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

  scan_ruby:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit

  scan_js:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Scan for security vulnerabilities in JS dependencies
        run: npm audit --audit-level=high

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Run Rubocop (non-blocking)
        run: bundle exec rubocop -f github || true

  test:
    runs-on: ubuntu-latest
    needs: setup

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      CHATROOM_DATABASE_USERNAME: root
      CHATROOM_DATABASE_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev libvips

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true

      - name: Setup DB
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rails test

  deploy:
    name: Deploy to VPS
    needs: [test, lint, scan_ruby, scan_js]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e

            APP_DIR="/faidfadjri/chatroom"

            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/faidfadjri/realtime-chat.git $APP_DIR
            fi

            cd $APP_DIR

            git pull origin master

            docker compose down
            docker compose up -d --build

            echo "✅ Deployment success"
