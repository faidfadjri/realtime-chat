name: CI/CD

on:
  pull_request:
  push:
    branches: [master]

jobs:
  # Job setup biasanya digunakan untuk caching, tapi karena ruby/setup-ruby sudah handle,
  # kita bisa langsung ke scanning/testing untuk menghemat waktu (paralel).

  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true
      - run: bundle exec brakeman --no-pager
      - run: bundle exec bundler-audit --update

  scan_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true
      - run: bundle exec rubocop -f github || true

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      CHATROOM_DATABASE_USERNAME: root
      CHATROOM_DATABASE_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev libvips
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: chmod +x bin/* && sed -i 's/ruby.exe/ruby/g' bin/* || true
      - name: Setup DB
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load
      - name: Run tests
        run: bundle exec rails test

  deploy:
    name: Deploy to VPS
    needs: [test, lint, scan_ruby, scan_js]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            APP_DIR="$HOME/chatroom"

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            echo "${{ secrets.ENV }}" > .env
            echo "${{ secrets.RAILS_MASTER_KEY }}" > config/master.key
            chmod 600 config/master.key

            docker compose build --pull

            docker compose down
            docker compose up -d

            echo "Deployment success!"
